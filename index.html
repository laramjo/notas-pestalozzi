<script>
var US = 'https://script.google.com/macros/s/AKfycbx_dum7SA3KqMk8Q5PO3vPSQbgWzmfnxBEQdk3cjdRAY2nv5grP1bvFzy-tI0ze42-Z/exec';

var Q = '"';
function h(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function d(cls,content){ return '<div class='+Q+cls+Q+'>'+content+'</div>'; }
function sp(cls,content){ return '<span class='+Q+cls+Q+'>'+content+'</span>'; }

function consultarAPI(p){
  return new Promise(function(resolve,reject){
    var cb='cb_'+Date.now();
    var s=document.createElement('script');
    var pm=new URLSearchParams(p);
    pm.append('callback',cb);
    window[cb]=function(data){
      delete window[cb];
      if(document.body.contains(s))document.body.removeChild(s);
      resolve(data);
    };
    s.onerror=function(){
      delete window[cb];
      if(document.body.contains(s))document.body.removeChild(s);
      reject(new Error('Error'));
    };
    s.src=US+'?'+pm.toString();
    document.body.appendChild(s);
  });
}

function mostrarAlerta(msg,tipo){
  var a=document.getElementById('mensaje-alerta');
  a.className='pn-alerta '+tipo;
  a.innerText=msg;
}
function limpiarAlerta(){
  var a=document.getElementById('mensaje-alerta');
  a.className='pn-alerta';
  a.innerText='';
}

function des(p){
  if(p===null||p===undefined) return {texto:'Sin notas',clase:'badge-null',color:'#64748b',msg:'msg-info'};
  if(p>=4.6) return {texto:'Desempeño Superior',clase:'badge-superior',color:'#10b981',msg:'msg-superior'};
  if(p>=4.0) return {texto:'Desempeño Alto',clase:'badge-alto',color:'#3b82f6',msg:'msg-alto'};
  if(p>=3.0) return {texto:'Desempeño Básico',clase:'badge-basico',color:'#f59e0b',msg:'msg-basico'};
  return {texto:'Desempeño Bajo',clase:'badge-bajo',color:'#ef4444',msg:'msg-bajo'};
}
function colorNota(n){
  if(n===null) return '#64748b';
  if(n>=4.6) return '#10b981';
  if(n>=4.0) return '#3b82f6';
  if(n>=3.0) return '#f59e0b';
  return '#ef4444';
}
function textoMsg(p,m,esFinal){
  if(p===null) return 'Aún no hay actividades calificadas en <strong>'+h(m)+'</strong>.';
  if(esFinal){
    if(p>=4.6) return 'Alcanzaste <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — ¡Desempeño Superior! Resultado excelente.';
    if(p>=4.0) return 'Alcanzaste <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Alto. ¡Muy buen resultado!';
    if(p>=3.0) return 'Alcanzaste <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Básico. Aprobaste la materia.';
    return 'Alcanzaste <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Bajo. No alcanzaste el mínimo aprobatorio (3.0).';
  }
  if(p>=4.6) return 'Llevas <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — ¡Desempeño Superior! Excelente trabajo.';
  if(p>=4.0) return 'Llevas <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Alto. ¡Muy bien!';
  if(p>=3.0) return 'Llevas <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Básico. Puedes mejorar.';
  return 'Llevas <strong>'+p.toFixed(2)+'</strong> en <strong>'+h(m)+'</strong> — Desempeño Bajo. Necesitas subir <strong>'+(3-p).toFixed(2)+'</strong> puntos para alcanzar el mínimo (3.0).';
}

async function consultarNotas(){
  var codigo=document.getElementById('input-codigo').value.trim().toUpperCase();
  var btn=document.getElementById('btn-consultar');
  limpiarAlerta();
  if(!codigo){mostrarAlerta('⚠️ Escribe tu código antes de continuar.','warning');return;}
  btn.disabled=true;
  btn.innerText='Consultando...';
  try{
    var datos=await consultarAPI({action:'getNotas',codigo:codigo});
    btn.disabled=false;
    btn.innerText='Ver mis notas';
    if(datos.error){mostrarAlerta('❌ '+datos.error,'error');return;}
    renderizar(datos);
  }catch(e){
    btn.disabled=false;
    btn.innerText='Ver mis notas';
    mostrarAlerta('❌ Error de conexión. Intenta nuevamente.','error');
  }
}

function renderizar(datos){
  document.getElementById('panel-login').style.display='none';
  document.getElementById('panel-resultados').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('res-nombre').innerText=datos.nombre;
  document.getElementById('res-grupo').innerText='Grado '+datos.grupo;
  document.getElementById('res-codigo').innerText=datos.codigo;

  var cont=document.getElementById('contenedor-materias');
  cont.innerHTML='';

  datos.materias.forEach(function(mat){
    var def=mat.definitiva;
    var dDef=des(def);

    var card=document.createElement('div');
    card.className='pn-materia-card';

    // Header materia
    var html='<div class='+Q+'pn-materia-header'+Q+'>';
    html+='<span class='+Q+'pn-materia-titulo'+Q+'>'+h(mat.materia)+'</span>';
    html+='</div>';

    // Tabs
    var nombres=['Período 1','Período 2','Período 3','Período 4'];
    html+='<div class='+Q+'pn-periodo-tabs'+Q+'>';
    mat.periodos.forEach(function(p,i){
      var activo=i===0?' activo':'';
      html+='<button class='+Q+'pn-periodo-tab'+activo+Q+' onclick='+Q+'cambiarTab(this,'+i+')'+Q+'>'+nombres[i]+'</button>';
    });
    html+='</div>';

    // Contenido períodos
    mat.periodos.forEach(function(p,i){
      var visible=i===0?' visible':'';
      var dP=des(p.promedio);
      var promDisplay=p.promedio!==null?p.promedio.toFixed(2):'—';

      // Definitiva acumulada
      var sumaHasta=0;
      for(var k=0;k<=i;k++) sumaHasta+=mat.periodos[k].promedio||0;
      var defAcum=Math.round((sumaHasta/4)*100)/100;
      var dDA=des(defAcum);

      html+='<div class='+Q+'pn-periodo-content'+visible+Q+' data-idx='+Q+i+Q+'>';
      html+='<div class='+Q+'pn-periodo-body'+Q+'>';

      // IZQUIERDA: notas
      html+='<div class='+Q+'pn-periodo-left'+Q+'>';
      if(p.notas.length===0){
        html+='<p class='+Q+'pn-sin-notas'+Q+'>No hay actividades registradas en este período.</p>';
      } else {
        html+='<div class='+Q+'pn-notas-grid'+Q+'>';
        p.notas.forEach(function(n){
          var val=n.nota!==null?n.nota.toFixed(1):'·';
          html+='<div class='+Q+'pn-nota-item'+Q+'>';
          html+='<span class='+Q+'pn-nota-act'+Q+' title='+Q+h(n.actividad)+Q+'>'+h(n.actividad)+'</span>';
          html+='<span class='+Q+'pn-nota-val'+Q+' style='+Q+'color:'+colorNota(n.nota)+Q+'>'+val+'</span>';
          html+='</div>';
        });
        html+='</div>';
      }
      html+='</div>'; // cierre left

      // DERECHA: nota del período
      html+='<div class='+Q+'pn-periodo-right'+Q+'>';
      html+='<div class='+Q+'pn-right-label'+Q+'>Nota del período</div>';
      html+='<div class='+Q+'pn-right-valor'+Q+' style='+Q+'color:'+dP.color+Q+'>'+promDisplay+'</div>';
      html+='<span class='+Q+'pn-right-badge '+dP.clase+Q+'>'+dP.texto+'</span>';
      html+='</div>'; // cierre right

      html+='</div>'; // cierre periodo-body

      // BARRA DEFINITIVA
      html+='<div class='+Q+'pn-def-barra'+Q+'>';
      html+='<div class='+Q+'pn-def-num'+Q+' style='+Q+'color:'+dDA.color+Q+'>'+defAcum.toFixed(2)+'</div>';
      html+='<div class='+Q+'pn-def-info'+Q+'>';
      html+='<div class='+Q+'pn-def-titulo'+Q+'>Nota definitiva</div>';
      html+='<span class='+Q+'pn-def-badge2 '+dDA.clase+Q+'>'+dDA.texto+'</span>';
      html+='</div>';
      html+='</div>';

      // ESCALA
      html+='<div class='+Q+'pn-escala'+Q+'>Escala: 1.0 a 5.0 &nbsp;|&nbsp; Mínimo para aprobar: 3.0</div>';

      // MENSAJE DIAGNÓSTICO por período
      var esFinal=(i===mat.periodos.length-1);
      html+='<div class='+Q+'pn-msg '+dDA.msg+Q+'>'+textoMsg(defAcum,mat.materia,esFinal)+'</div>';

      html+='</div>'; // cierre pn-periodo-content
    });

    // Sin mensaje global — el diagnóstico ya está dentro de cada período

    card.innerHTML=html;
    cont.appendChild(card);
  });
}

function cambiarTab(btn,idx){
  var card=btn.closest('.pn-materia-card');
  card.querySelectorAll('.pn-periodo-tab').forEach(function(t){t.classList.remove('activo');});
  btn.classList.add('activo');
  card.querySelectorAll('.pn-periodo-content').forEach(function(c){c.classList.remove('visible');});
  var target=card.querySelector('[data-idx='+Q+idx+Q+']');
  if(target) target.classList.add('visible');
}

function volver(){
  document.getElementById('panel-login').style.display='block';
  document.getElementById('panel-resultados').style.display='none';
  document.getElementById('input-codigo').value='';
  limpiarAlerta();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
